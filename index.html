<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapScale Pro</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}

input, select, button {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
    border: none;
}

button {
    background: #22c55e;
    font-weight: bold;
    cursor: pointer;
}

img {
    max-width: 100%;
    margin-top: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🚀 SnapScale Pro</h1>

<div class="container">

<input type="file" id="file">

<!-- Preset -->
<select id="preset">
<option value="">Preset Size</option>
<option value="1080x1080">Instagram</option>
<option value="1280x720">YouTube</option>
<option value="1920x1080">Full HD</option>
</select>

<input type="number" id="width" placeholder="Width">
<input type="number" id="height" placeholder="Height">

<label>
<input type="checkbox" id="lock"> Lock Ratio
</label>

<input type="number" id="percent" placeholder="Resize %">

<select id="format">
<option value="jpeg">JPG</option>
<option value="png">PNG</option>
<option value="webp">WEBP</option>
</select>

<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">

<button onclick="upload()">Resize Image</button>

<p id="status"></p>

<img id="preview">

<a id="download" style="display:none;">
<button>Download</button>
</a>

</div>

<script src="script.js"></script>

</body>
</html>
