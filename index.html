<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapScale Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🚀 SnapScale Pro</h1>

<div class="container">

<input type="file" id="file">

<h3>Resize</h3>
<input type="number" id="width" placeholder="Width">
<input type="number" id="height" placeholder="Height">
<input type="number" id="percent" placeholder="Resize %">

<h3>Background</h3>
<select id="bgMode">
<option value="none">None</option>
<option value="color">Solid</option>
<option value="blur">Blur</option>
</select>

<input type="color" id="bgColor" value="#ffffff">

<h3>Format</h3>
<select id="format">
<option value="jpeg">JPG</option>
<option value="png">PNG</option>
<option value="webp">WEBP</option>
</select>

<label>Quality</label>
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">

<h3>Theme</h3>
<select id="theme" onchange="changeTheme()">
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="neon">Neon</option>
</select>

<button onclick="upload()">Process Image</button>

<p id="status"></p>

<img id="preview">

<a id="download" style="display:none;">
<button>Download</button>
</a>

</div>

<script src="script.js"></script>

</body>
</html>
