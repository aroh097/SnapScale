<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapScale 3D</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

/* Floating background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, #38bdf8, #22c55e);
  filter: blur(150px);
  opacity: 0.2;
  z-index: -1;
}

/* Card */
.container {
  max-width: 420px;
  margin: 50px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}

/* 3D hover */
.container:hover {
  transform: rotateX(5deg) rotateY(5deg) scale(1.02);
}

/* Inputs */
input, select, button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

/* Button glow */
button {
  background: linear-gradient(45deg,#22c55e,#38bdf8);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(56,189,248,0.5);
}

button:hover {
  transform: scale(1.05);
}

/* Image preview */
img {
  max-width: 100%;
  margin-top: 15px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* Title */
h1 {
  text-align: center;
  background: linear-gradient(45deg,#38bdf8,#22c55e);
  -webkit-background-clip: text;
  color: transparent;
}
</style>
</head>

<body>

<div class="bg"></div>

<h1>🚀 SnapScale 3D</h1>

<div class="container" id="card">

<input type="file" id="file">

<input type="number" id="width" placeholder="Width">
<input type="number" id="height" placeholder="Height">

<select id="format">
  <option value="jpeg">JPG</option>
  <option value="png">PNG</option>
  <option value="webp">WEBP</option>
</select>

<button onclick="upload()">Resize Image</button>

<p id="status"></p>

<img id="preview">

<a id="download" style="display:none;">
  <button>Download</button>
</a>

</div>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];
  const width = document.getElementById("width").value;
  const height = document.getElementById("height").value;
  const format = document.getElementById("format").value;

  if (!file) return alert("Image select karo");

  document.getElementById("status").innerText = "Processing...";

  const formData = new FormData();
  formData.append("image", file);
  formData.append("width", width);
  formData.append("height", height);
  formData.append("format", format);

  const res = await fetch("https://snapscale-jvat.onrender.com/resize", {
    method: "POST",
    body: formData
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  document.getElementById("preview").src = url;

  const d = document.getElementById("download");
  d.href = url;
  d.download = "snapscale." + format;
  d.style.display = "block";

  document.getElementById("status").innerText = "Done ✅";
}

/* 3D tilt effect */
const card = document.getElementById("card");

card.addEventListener("mousemove", (e) => {
  const x = (window.innerWidth / 2 - e.pageX) / 20;
  const y = (window.innerHeight / 2 - e.pageY) / 20;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

card.addEventListener("mouseleave", () => {
  card.style.transform = "rotateY(0) rotateX(0)";
});
</script>

</body>
</html>
