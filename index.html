<!DOCTYPE html>
<html>
<head>
  <title>SnapScale Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 SnapScale Pro</h1>

<div class="container">

  <!-- Drag Drop -->
  <div id="drop-area">
    <p>📂 Drag & Drop Image</p>
    <button onclick="file.click()">Choose File</button>
    <input type="file" id="file" hidden>
  </div>

  <select id="unit">
    <option value="px">Pixels</option>
    <option value="cm">CM</option>
    <option value="inch">Inch</option>
  </select>

  <input type="number" id="width" placeholder="Width">
  <input type="number" id="height" placeholder="Height">

  <select id="format">
    <option value="jpeg">JPG</option>
    <option value="png">PNG</option>
    <option value="webp">WEBP</option>
  </select>

  <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">

  <button onclick="upload()">Resize</button>
  <button onclick="removeBG()">Remove Background</button>

  <img id="preview">

  <a id="download" style="display:none;">
    <button>Download</button>
  </a>

</div>

<script src="script.js"></script>
</body>
</html>
