<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapScale Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🚀 SnapScale Pro</h1>

<select onchange="setBackground(this.value)">
  <option value="default">Image Theme</option>
  <option value="dark">Dark</option>
  <option value="gradient">Gradient</option>
</select>

<div class="container">

<input type="file" id="file">

<select id="unit">
<option value="px">Pixels</option>
<option value="cm">CM</option>
<option value="inch">Inch</option>
</select>

<input type="number" id="width" placeholder="Width">
<input type="number" id="height" placeholder="Height">

<input type="number" id="percent" placeholder="% Resize">

<select id="format">
<option value="jpeg">JPG</option>
<option value="png">PNG</option>
<option value="webp">WEBP</option>
</select>

<label>Quality</label>
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">

<button onclick="upload()">Process Image</button>

<div id="loader" style="display:none;">Processing...</div>

<img id="preview">

<a id="download" style="display:none;">
<button>Download</button>
</a>

</div>

<script src="script.js"></script>

</body>
</html>
