<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapScale Pro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2>🚀 SnapScale Pro</h2>

  <div class="container">

    <!-- FILE UPLOAD -->
    <input type="file" id="file" accept="image/*">

    <!-- FORMAT -->
    <select id="format">
      <option value="jpeg">JPG</option>
      <option value="png">PNG</option>
      <option value="webp">WEBP</option>
    </select>

    <!-- SIZE -->
    <input type="number" id="width" placeholder="Width (px)">
    <input type="number" id="height" placeholder="Height (px)">

    <!-- QUALITY -->
    <label>Quality</label>
    <input type="range" id="quality" min="10" max="100" value="80">

    <!-- BUTTON -->
    <button onclick="upload()">Resize Image</button>

    <!-- LOADER -->
    <div id="loader" style="display:none;">Processing...</div>

    <!-- PREVIEW -->
    <img id="preview" style="display:none; margin-top:15px; width:250px;">

    <!-- DOWNLOAD -->
    <br><br>
    <a id="download" style="display:none;">
      <button>Download</button>
    </a>

  </div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
