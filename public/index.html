<!DOCTYPE html>
<html>
<head>
  <title>SnapScale Pro</title>
  <link rel="stylesheet" href="style.css">

  <!-- FREE AI -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
</head>

<body>

<h2>🚀 SnapScale Pro</h2>

<div class="box">

<input type="file" id="file"><br>

<select id="format">
  <option value="jpeg">JPG</option>
  <option value="png">PNG</option>
  <option value="webp">WEBP</option>
</select><br>

<input type="number" id="width" placeholder="Width">
<input type="number" id="height" placeholder="Height"><br>

<input type="range" id="quality" min="10" max="100" value="80"><br>

<button onclick="upload()">Resize</button>
<button onclick="aiRemoveBG()">🤖 AI Remove BG</button>

<br><br>

<img id="preview" width="250">

<br><br>

<a id="download" style="display:none;">Download</a>

</div>

<script src="script.js"></script>

</body>
</html>
